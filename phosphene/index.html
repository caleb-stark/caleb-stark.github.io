<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phosphene Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/script.js" defer></script>
</head>

<body>
  <header>
    <div class="container">
      <h1><a href="index.html">phosphene tracker</a></h1>
    </div>
  </header>

  <main>
    <div class="container">
      <section>
        <h2>Progress</h2>
        <div class="progress_bar">
          <div id="progress_fill"></div>
        </div>
        <p id="progress_text"></p>
      </section>

      <section>
        <h2>phosphene weapons</h2>

        <div class="filters">
          <input type="text" id="search" placeholder="search by weapon name">

          <select id="source_filter">
            <option value="">all sources</option>
          </select>

          <select id="location_filter">
            <option value="">all locations</option>
          </select>
        </div>
      </section>

      <section id="phosphenes">
        <h2>phosphenes</h2>
      </section>
    </div>
  </main>
  <footer>
    <div class="container">
      <p>caleb stark - phosphene tracker - 2026</p>
    </div>
  </footer>
</body>

</html>
